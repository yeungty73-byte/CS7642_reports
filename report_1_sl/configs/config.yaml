# CS 7641 SL Report — Covertype experiment configuration
# All knobs lifted here so the report-generator can read them back as
# canonical provenance. Edit one place, re-run, results refresh.

experiment:
  name: "covertype_sl_demo1"
  seed: 7641                        # Global RNG seed. Used for sampling,
                                    # splits, NN init, and any stochastic
                                    # learner. Single source of truth.

data:
  sample_size: 20000                # ~20k working subsample per rubric.
  sampling: "stratified"            # {"stratified","random"}. Default.
  test_size: 0.20                   # Held-out test fraction (4000 rows).
  cv_folds: 5                       # Stratified k-fold for tuning.
  scaler: "standard"                # Fitted train-only; binary cols passed through.
  continuous_features: 10           # First 10 cols are continuous.
                                    # Cols 10..43 are 4 wilderness + 40 soil.

models:
  decision_tree:
    criterion: "gini"
    ccp_alpha_grid: [0.0, 0.0001, 0.0005, 0.001, 0.003, 0.005, 0.01]
    max_depth_grid: [4, 8, 12, 16, 24, null]
  knn:
    k_grid: [1, 3, 7, 15, 31, 61, 101]
    weights: ["uniform", "distance"]
    metric: "minkowski"
    p: 2
  svm:
    kernels: ["linear", "rbf"]
    # Smaller, log-spaced grid — runtime evidence in report justifies it.
    C_grid: [0.1, 1.0, 10.0]
    gamma_grid: ["scale", 0.01, 0.1]
    cv_folds_svm: 3                 # Smaller CV for SVM, runtime-justified.
    subsample_for_tuning: 8000      # Tune SVM on 8k of train, refit on full.
  mlp_sklearn:
    hidden_layer_sizes: [[64], [128], [64, 64], [128, 64]]
    alpha_grid: [0.0001, 0.001]
    learning_rate_init: 0.05
    max_iter: 300
    early_stopping: true
    validation_fraction: 0.15
    n_iter_no_change: 20
    # SGD-only constraints (locked, not tunable).
    solver: "sgd"
    momentum: 0.0
    nesterovs_momentum: false
  mlp_torch:
    architectures:                  # [hidden_dims] — depth/width sweep.
      - [128]
      - [64, 64]
      - [128, 64]
      - [64, 64, 32]
    learning_rate: 0.1
    batch_size: 128
    epochs: 120
    weight_decay: 0.0001
    early_stop_patience: 12
    # Activation function study (extra credit).
    activations: ["relu", "gelu", "silu", "tanh"]

curves:
  learning_curve_sizes: [0.05, 0.10, 0.20, 0.40, 0.70, 1.00]
  cv_folds_lc: 3                    # 3-fold inside LC to bound runtime.

evaluation:
  primary_metric: "macro_f1"        # Used for model selection in CV.
  report_metrics:
    - "accuracy"
    - "macro_f1"
    - "balanced_accuracy"

leakage_debug:
  run_dummy: true
  run_shuffled_label: true
  run_split_integrity: true

paths:
  data_cache: "data/covtype_cache.npz"
  results_dir: "results"
  figures_dir: "results/figures"
  tables_dir: "results/tables"
  logs_dir: "results/logs"
  models_dir: "results/models"
